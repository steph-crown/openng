services:
  postgres:
    image: postgres:16-alpine
    container_name: openng_postgres
    environment:
      POSTGRES_USER: openng
      POSTGRES_PASSWORD: openng_dev
      POSTGRES_DB: openng_dev
    ports:
      - "5434:5432"
    volumes:
      - openng_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: openng_redis
    ports:
      - "6380:6379"
    volumes:
      - openng_redis_data:/data

  signoz:
    image: signoz/signoz:latest
    container_name: openng_signoz
    ports:
      - "3301:3301"
    depends_on:
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server:23.11
    ports:
      - "8123:8123"

volumes:
  openng_postgres_data:
  openng_redis_data:
